services:
  - type: web
    name: soccer-quant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd scripts && gunicorn dashboard:server --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: TAVILY_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
